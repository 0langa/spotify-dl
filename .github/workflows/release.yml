name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: Release version without v prefix
        required: true
        default: 2.0.0

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: 10.0.x
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: 0.11.21
      - uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2
        with:
          deno-version: v2.8.3
      - name: Install FFmpeg
        run: choco install ffmpeg --version=8.1.2 --no-progress -y
      - name: Restore locked dependencies
        run: uv sync --project backend --extra dev --locked
      - name: Verify source
        run: |
          uv run --project backend --extra dev ruff check backend
          uv run --project backend --extra dev ruff format --check backend
          uv run --project backend --extra dev python -m pytest --cov=playlistdl_backend --cov-fail-under=80
          ./scripts/audit-python-dependencies.ps1
          dotnet restore PlaylistDl.slnx
          dotnet format PlaylistDl.slnx --verify-no-changes --no-restore
          dotnet build PlaylistDl.slnx --configuration Release --no-restore
          dotnet test PlaylistDl.slnx --configuration Release --no-build
      - name: Determine version
        id: version
        shell: pwsh
        run: |
          $version = if ('${{ github.event_name }}' -eq 'workflow_dispatch') { '${{ inputs.version }}' } else { '${{ github.ref_name }}'.TrimStart('v') }
          "value=$version" >> $env:GITHUB_OUTPUT
      - name: Build standalone executable
        run: ./scripts/build-release.ps1 -Version '${{ steps.version.outputs.value }}'
      - name: Verify release integrity and scan executable
        run: ./scripts/verify-release.ps1
      - name: Smoke test frozen backend lifecycle
        run: ./scripts/smoke-backend-lifecycle.ps1
      - name: Smoke test frozen Spotify resolver
        run: ./scripts/smoke-frozen-backend.ps1
      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $tag = 'v${{ steps.version.outputs.value }}'
          $assets = @(
            'artifacts/release/PlaylistDL.exe',
            'artifacts/release/SHA256SUMS.txt',
            'artifacts/release/THIRD_PARTY_NOTICES.md',
            'artifacts/release/LICENSE'
          )
          if (gh release view $tag 2>$null) {
            gh release upload $tag @assets --clobber
          } else {
            gh release create $tag @assets --title "Playlist DL ${{ steps.version.outputs.value }}" --generate-notes
          }
